# JWT token expiration time in milliseconds (900000ms = 15 minutes)
# This is the token's internal validity period. After this time, the token is rejected by the backend.
jwt.expiration=900000
jwt.cookie-name=jwt-cookie
# JWT cookie max age in seconds (86400s = 24 hours)
# Note: Without refresh tokens, users will be logged out after jwt.expiration time, even if this cookie persists.
# This setting would be useful with refresh token implementation for better UX.
jwt.cookie-max-age=86400